        }

        }

            border-radius: 3px;

            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;

            margin-bottom: 8px;

            color: #ffb3ba;
            animation: pulse 0.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }

            0%, 100% { transform: translateY(0); }

    <div class="container">
        <h1>英语学习助手</h1>

        <!-- 话题库 -->
        <div class="card">
            <h2>📚 话题库</h2>
            <div class="input-group">
                <input type="text" id="topicInput" placeholder="添加新话题...">
                <button class="btn-primary" onclick="addTopic()">添加</button>
            </div>
            <div id="topicList" class="item-list"></div>
            <div class="stats">
                <div class="stat-item">
                    <div class="stat-value" id="topicCount">0</div>
                    <div class="stat-label">话题数</div>
                </div>
            </div>
        </div>

        <!-- 单词库 -->
        <div class="card">
            <h2>📝 单词库</h2>
            <div class="input-group">
                <input type="text" id="wordInput" placeholder="添加新单词...">
                <button class="btn-primary" onclick="addWord()">添加</button>
            </div>
            <div id="wordList" class="item-list"></div>
            <div class="stats">
                <div class="stat-item">
                    <div class="stat-value" id="wordCount">0</div>
                    <div class="stat-label">单词数</div>
                </div>
            </div>
        </div>

        <!-- YouTube视频库 -->
        <div class="card">
            <h2>🎬 YouTube视频库</h2>
            <div class="input-group">
                <input type="text" id="videoInput" placeholder="粘贴YouTube视频链接...">
                <button class="btn-primary" onclick="addVideo()">添加</button>
            </div>
            <div id="videoList" class="item-list"></div>
            <div class="stats">
                <div class="stat-item">
                    <div class="stat-value" id="videoCount">0</div>
                    <div class="stat-label">视频数</div>
                </div>
            </div>
        </div>

        <!-- 随机抽取 -->
        <div class="card random-section">
            <h2 style="justify-content: center;">🎲 随机抽取</h2>
            <div class="random-type" id="randomType">选择一个类型开始</div>
            <div class="random-display" id="randomDisplay">?</div>
            <div class="random-type" id="wordDefinition"></div>
            <div id="videoPlayer" class="video-container"></div>
            <div class="timer-buttons">
                <button class="btn-success" onclick="startRandom('topic')">抽取话题</button>
                <button class="btn-warning" onclick="startRandom('word')">抽取单词</button>
                <button class="btn-purple" onclick="startRandom('video')">抽取视频</button>
            </div>
        </div>

        <!-- 计时器 -->
        <div class="card timer-section">
            <h2 style="justify-content: center;">⏱️ 一分钟计时器</h2>
            <div class="timer-display" id="timerDisplay">01:00</div>
            <div class="timer-buttons">
                <button class="btn-success" id="startBtn" onclick="startTimer()">开始计时</button>
                <button class="btn-danger" onclick="resetTimer()">重置</button>
            </div>
        </div>
    </div>

        let videos = JSON.parse(localStorage.getItem('videos')) || [];
        let timerInterval = null;
        let timeLeft = 60;

        function saveData() {
            localStorage.setItem('topics', JSON.stringify(topics));
            localStorage.setItem('words', JSON.stringify(words));
            localStorage.setItem('videos', JSON.stringify(videos));
        }

        function extractVideoId(url) {
            const patterns = [
                /(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([^&\n?#]+)/,
                /youtube\.com\/shorts\/([^&\n?#]+)/
            ];
            for (const pattern of patterns) {
                const match = url.match(pattern);
                if (match) return match[1];
            }
            return null;
        }

        function addVideo() {
            const input = document.getElementById('videoInput');
            const url = input.value.trim();
            if (!url) return;
            
            const videoId = extractVideoId(url);
            if (!videoId) {
                alert('请输入有效的YouTube链接');
                return;
            }
            
            const exists = videos.some(v => v.id === videoId);
            if (exists) {
                alert('该视频已添加');
                return;
            }
            
            videos.push({ id: videoId, url: url });
            saveData();
            renderVideos();
            input.value = '';
        }

        function deleteVideo(index) {
            videos.splice(index, 1);
            saveData();
            renderVideos();
        }

        function renderVideos() {
            const list = document.getElementById('videoList');
            document.getElementById('videoCount').textContent = videos.length;
            
            if (videos.length === 0) {
                list.innerHTML = '<div class="empty-message">还没有视频，添加一个开始吧</div>';
                return;
            }
            
            list.innerHTML = videos.map((video, index) => `
                <div class="video-thumbnail">
                    <span>视频 ${index + 1}</span>
                    <button class="btn-danger" onclick="deleteVideo(${index})">删除</button>
                </div>
            `).join('');
        }

        function addTopic() {
            const input = document.getElementById('topicInput');
            const topic = input.value.trim();
            if (topic && !topics.includes(topic)) {
                topics.push(topic);
                saveData();
                renderTopics();
                input.value = '';
            }
        }

        function addWord() {
            const input = document.getElementById('wordInput');
            const word = input.value.trim();
            if (word && !words.includes(word)) {
                words.push(word);
                saveData();
                renderWords();
                input.value = '';
            }
        }

        function deleteTopic(index) {
            topics.splice(index, 1);
            saveData();
            renderTopics();
        }

        function deleteWord(index) {
            words.splice(index, 1);
            saveData();
            renderWords();
        }

        function renderTopics() {
            const list = document.getElementById('topicList');
            document.getElementById('topicCount').textContent = topics.length;
            
            if (topics.length === 0) {
                list.innerHTML = '<div class="empty-message">还没有话题，添加一个开始吧</div>';
                return;
            }
            
            list.innerHTML = topics.map((topic, index) => `
                <div class="item">
                    <span>${topic}</span>
                    <button class="btn-danger" onclick="deleteTopic(${index})">删除</button>
                </div>
            `).join('');
        }

        function renderWords() {
            const list = document.getElementById('wordList');
            document.getElementById('wordCount').textContent = words.length;
            
            if (words.length === 0) {
                list.innerHTML = '<div class="empty-message">还没有单词，添加一个开始吧</div>';
                return;
            }
            
            list.innerHTML = words.map((word, index) => `
                <div class="item">
                    <span>${word}</span>
                    <button class="btn-danger" onclick="deleteWord(${index})">删除</button>
                </div>
            `).join('');
        }

        function startRandom(type) {
            const display = document.getElementById('randomDisplay');
            const typeDisplay = document.getElementById('randomType');
            const definitionDisplay = document.getElementById('wordDefinition');
            const videoPlayer = document.getElementById('videoPlayer');
            
            videoPlayer.classList.remove('active');
            videoPlayer.innerHTML = '';
            
            if (type === 'video') {
                if (videos.length === 0) {
                    display.textContent = '视频库为空';
                    typeDisplay.textContent = '🎬 YouTube视频';
                    return;
                }
                
                const randomIndex = Math.floor(Math.random() * videos.length);
                const video = videos[randomIndex];
                typeDisplay.textContent = '🎬 YouTube视频';
                display.textContent = `视频 ${randomIndex + 1} / ${videos.length}`;
                definitionDisplay.textContent = '';
                videoPlayer.classList.add('active');
                videoPlayer.innerHTML = `
                    <iframe src="https://www.youtube.com/embed/${video.id}?cc_load_policy=1&cc_lang_pref=en&hl=zh-CN" allowfullscreen></iframe>
                    <div class="subtitle-tip">💡 提示：点击视频下方的CC按钮 → 设置 → 字幕 → 翻译 → 选择中文</div>
                `;
                return;
            }
            
            const list = type === 'topic' ? topics : words;
            
            if (list.length === 0) {
                display.textContent = '库为空';
                return;
            }
            
            typeDisplay.textContent = type === 'topic' ? '🎯 话题' : '📝 单词';
            
            let count = 0;
            const maxCount = 20;
            const interval = setInterval(() => {
                const randomIndex = Math.floor(Math.random() * list.length);
                const item = list[randomIndex];
                display.textContent = item;
                
                if (type === 'word') {
                    definitionDisplay.textContent = '加载中...';
                    fetchDefinition(item);
                } else {
                    definitionDisplay.textContent = '';
                }
                
                count++;
                
                if (count >= maxCount) {
                    clearInterval(interval);
                }
            }, 100);
        }

        async function fetchDefinition(word) {
            const definitionDisplay = document.getElementById('wordDefinition');
            try {
                const response = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${word}`);
                const data = await response.json();
                
                if (data && data.length > 0) {
                    const entry = data[0];
                    let definitions = [];
                    
                    if (entry.meanings && entry.meanings.length > 0) {
                        const firstMeaning = entry.meanings[0];
                        if (firstMeaning.definitions && firstMeaning.definitions.length > 0) {
                            definitions.push(`[${firstMeaning.partOfSpeech}] ${firstMeaning.definitions[0].definition}`);
                            if (firstMeaning.definitions[0].example) {
                                definitions.push(`例句: "${firstMeaning.definitions[0].example}"`);
                            }
                        }
                    }
                    
                    if (definitions.length > 0) {
                        definitionDisplay.textContent = definitions.join(' ');
                    } else {
                        definitionDisplay.textContent = '暂无解释';
                    }
                } else {
                    definitionDisplay.textContent = '暂无解释';
                }
            } catch (error) {
                definitionDisplay.textContent = '获取解释失败';
            }
        }

        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        function updateTimerDisplay() {
            const display = document.getElementById('timerDisplay');
            display.textContent = formatTime(timeLeft);
            
            display.classList.remove('timer-running', 'timer-warning', 'timer-danger');
            
            if (timerInterval) {
                if (timeLeft <= 10) {
                    display.classList.add('timer-danger');
                } else if (timeLeft <= 30) {
                    display.classList.add('timer-warning');
                } else {
                    display.classList.add('timer-running');
                }
            }
        }

        function startTimer() {
            if (timerInterval) return;
            
            document.getElementById('startBtn').disabled = true;
            
            timerInterval = setInterval(() => {
                timeLeft--;
                updateTimerDisplay();
                
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    timerInterval = null;
                    document.getElementById('startBtn').disabled = false;
                    alert('时间到！一分钟练习结束');
                }
            }, 1000);
            
            updateTimerDisplay();
        }

        function resetTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
            timeLeft = 60;
            document.getElementById('startBtn').disabled = false;
            updateTimerDisplay();
        }

        document.getElementById('topicInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addTopic();
        });

        document.getElementById('wordInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addWord();
        });

        document.getElementById('videoInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addVideo();
        });

        renderTopics();
        renderWords();
        renderVideos();
        updateTimerDisplay();

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').then(() => {
                console.log('Service Worker 已注册');
            });
        }
